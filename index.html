<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="3D-to-2D Solar System Visualization using JPL Horizons API">
    <title>Solar System Visualization</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@400;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="ui-panel left-panel">
        <h1>Solar System Explorer</h1>

        <div class="control-group">
            <label for="date-input">Observation Date</label>
            <input type="date" id="date-input">
        </div>

        <div class="control-group checkbox-group">
            <input type="checkbox" id="minor-planets-cb">
            <label for="minor-planets-cb">Minor & Dwarf Planets</label>
        </div>

        <button id="update-btn">
            <span>Calculate / Update</span>
            <div class="spinner" id="spinner"></div>
        </button>

        <div id="status-msg">Select a date to visualize orbits.</div>

        <div class="control-group timelapse-container" id="timelapse-container" style="display: none;">
            <label>Time Lapse</label>
            <div class="timelapse-row">
                <button id="play-pause-btn" class="timelapse-btn">
                    <span id="play-pause-icon">▶</span> <span id="play-pause-text">Play</span>
                </button>
                <button id="reset-time-btn" class="timelapse-btn">
                    <span>↺ Reset</span>
                </button>
            </div>
            
            <div class="speed-slider-group">
                <div class="speed-slider-labels">
                    <span class="speed-label-text">Speed</span>
                    <span id="speed-display" class="speed-display-val">10 days/sec</span>
                </div>
                <input type="range" id="speed-slider" min="1" max="180" value="10">
            </div>

            <div id="simulated-date-display" class="simulated-date-display">
                Date: -
            </div>
        </div>

        <div class="instructions">
            <p><strong>Controls:</strong></p>
            <p>Scroll to Zoom | Drag to Pan</p>
        </div>
    </div>

    <div class="ui-panel right-panel" id="planet-list-panel">
        <h1>Planets with Moons</h1>
        <div id="planet-list-status" class="planet-list-status">No data loaded. Click "Calculate / Update" to load
            moons.</div>
        <div class="planet-list" id="planet-list" style="display: none;">
            <!-- Generated dynamically -->
        </div>
    </div>

    <canvas id="solar-canvas"></canvas>

    <div class="ui-panel bottom-right-panel" id="inclination-panel">
        <label for="inclination-slider">Viewing Inclination: <span id="inclination-display">60°</span></label>
        <input type="range" id="inclination-slider" min="0" max="90" value="60">
    </div>

    <script type="module" src="js/app.js"></script>
</body>

</html>
